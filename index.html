        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #document-container { position: absolute; left: -9999px; top: 0; width: 800px; }
        .render-container { position: relative; width: 100%; background-color: white; }
        .background-image { display: block; width: 100%; height: auto; }
        .data-field { position: absolute; font-family: Arial, sans-serif; color: black; }

<body class="bg-gray-100 text-gray-800">

    const bindNav = (id, type) => {
        const btn = document.getElementById(id);

    };

    bindNav('select-baikal-spb', 'baikal-spb');
    bindNav('select-fortuna', 'fortuna');
    bindNav('select-atek', 'atek');
    bindNav('select-newline', 'newline');
    bindNav('select-sltk', 'sltk');

    const backBtn = document.getElementById('back-to-selection');
    if (backBtn) backBtn.addEventListener('click', showSelectionScreen);

async function loadFile(url, type, elementId) {
    const response = await fetch(url);
    if (!response.ok) {
        throw new Error(`Ошибка загрузки ${url}: ${response.statusText}`);
    }

    if (type === 'image') {
        const blob = await response.blob();
        const el = document.getElementById(elementId);
        if (el) el.src = URL.createObjectURL(blob);
    } else { // excel / docx (arraybuffer)
        return await response.arrayBuffer();
    }
}

// --- DOCUMENT GENERATION ---
function createFileName(prefix) {
    const dateValue = document.getElementById('input_date').value;
    const datePart = dateValue ? dateValue.split('-').reverse().join('.') : '';
    const cityPart = document.getElementById('input_city')?.value || '';
    let enginePart = document.getElementById('input_engine_model')?.value || '';
    // Для АТЭК первая модель из динамического списка
    if (!enginePart) {
        const firstDvs = document.querySelector('#atek-engines-list .atek-dvs');
        if (firstDvs) enginePart = firstDvs.value || '';
    }
    const recipientVal = document.getElementById('input_recipient_fio_dob')?.value || document.getElementById('input_recipient_name')?.value || document.getElementById('input_recipient_data')?.value || '';
    const lastNamePart = recipientVal ? recipientVal.split(' ')[0] : '';

    const baseName = [datePart, cityPart, enginePart, lastNamePart].filter(Boolean).join(' ');
    return (prefix ? prefix + ' ' : '') + baseName + '.pdf';
}

async function generatePdfFor(containerId) {
    const container = document.getElementById(containerId);
    const image = container.querySelector('.background-image');

    if (!image.src || image.naturalWidth === 0) {
        let fname = containerId.replace('-container','.jpg');
        alert(`Шаблон ${fname} не загружен. Проверьте файлы в репозитории.`);
        return;
    }

    showLoading('Подготовка PDF...');
    try {
        await new Promise(r => setTimeout(r, 100));
        const canvas = await html2canvas(container, { scale: 3, useCORS: true });
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        const pdf = new jsPDF({ orientation: 'p', unit: 'px', format: 'a4' });
        pdf.addImage(imgData, 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
        pdf.save(createFileName());
    } catch (error) {
        alert("Ошибка при создании PDF: " + error.message);
    } finally {
        hideLoading();
    }
}

// --- ATEK: сбор данных, заполнение docx, конвертация в PDF ---
function genitiveMonth(idx) {
    const m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    return m[idx];
}

function buildAtekData() {
    // number_date в формате: 29  от «26 » июня 2026г.
    const docNum = document.getElementById('input_doc_num').value || '';
    const date = new Date(document.getElementById('input_date').value || new Date());
    const day = date.getDate().toString();
    const month = genitiveMonth(date.getMonth());
    const year = date.getFullYear();
    const numberDate = `${docNum}  от «${day} » ${month} ${year}г.`;

    const fio = document.getElementById('input_recipient_name').value || '';

    // Собираем модели
    const rows = document.querySelectorAll('#atek-engines-list .atek-engine-row');
    const engines = [];
    rows.forEach(row => {
        const dvs = (row.querySelector('.atek-dvs').value || '').trim();
        let kol = parseInt(row.querySelector('.atek-kol').value, 10);
        if (isNaN(kol) || kol < 1) kol = 1;
        if (dvs) engines.push({ dvs, kol });
    });

    // Готовим данные под плейсхолдеры dvs1..3, korob1..3, kol1..3, mass1..3, fio1..3
    const data = { number_date: numberDate };
    for (let i = 0; i < 3; i++) {
        const n = i + 1;
        if (i < engines.length) {
            const e = engines[i];
            data['dvs' + n] = e.dvs;
            data['korob' + n] = 'короб';
            data['kol' + n] = String(e.kol);
            // mass: 75 кг/шт. Если 1 -> "75 кг", если больше -> "{total}кг (75 кг/шт)"
            if (e.kol === 1) {
                data['mass' + n] = '75 кг';
            } else {
                data['mass' + n] = (e.kol * 75) + 'кг (75 кг/шт)';
            }
            data['fio' + n] = fio; // одно ФИО на все строки
        } else {
            // Пустые строки таблицы
            data['dvs' + n] = '';
            data['korob' + n] = '';
            data['kol' + n] = '';
            data['mass' + n] = '';
            data['fio' + n] = '';
        }
    }
    return { data, engines };
}

function fillAtekDocx(data) {
    // Заполняем docx через docxtemplater. Возвращает Blob готового docx.
    const zip = new PizZip(atekDocxTemplate.slice(0)); // копия буфера
    const Docx = window.docxtemplater || window.Docxtemplater;
    const doc = new Docx(zip, {
        paragraphLoop: true,
        linebreaks: true,
        delimiters: { start: '{{', end: '}}' },
        // parser, как в рабочем примере: любой неизвестный/пустой тег -> '' (не роняет рендер)
        parser: (tag) => {
            const key = tag.trim();
            return {
                get: (scope) => (scope && scope[key] !== undefined && scope[key] !== null)
                    ? String(scope[key])
                    : ''
            };
        }
    });
    doc.render(data);
    return doc.getZip().generate({
        type: 'blob',
        mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
}

async function cloudconvertOnce(docxBlob) {
    const MAX_NETWORK_RETRIES = 3;
    const RETRY_DELAY_MS = 1500;
    const headers = {
        'Authorization': 'Bearer ' + CLOUDCONVERT_API_KEY,
        'Content-Type': 'application/json'
    };

    // Blob -> base64
    const b64 = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => {
            const res = r.result || '';
            const comma = res.indexOf(',');
            resolve(comma >= 0 ? res.slice(comma + 1) : res);
        };
        r.onerror = reject;
        r.readAsDataURL(docxBlob);
    });

    for (let attempt = 1; attempt <= MAX_NETWORK_RETRIES; attempt++) {
        try {
            if (attempt > 1) showLoading('Конвертация в PDF... (повтор ' + attempt + '/' + MAX_NETWORK_RETRIES + ')');
            else showLoading('Конвертация в PDF...');

            const jobBody = {
                tasks: {
                    'import-1': { operation: 'import/base64', file: b64, filename: 'atek.docx' },
                    'convert-1': {
                        operation: 'convert', input: 'import-1',
                        input_format: 'docx', output_format: 'pdf', engine: 'libreoffice'
                    },
                    'export-1': {
                        operation: 'export/url', input: 'convert-1',
                        inline: false, archive_multiple_files: false
                    }
                }
            };

            const createResp = await fetch('https://api.cloudconvert.com/v2/jobs', {
                method: 'POST', headers, body: JSON.stringify(jobBody)
            });
            if (!createResp.ok) {
                const t = await createResp.text().catch(() => '');
                const err = new Error('Создание задачи: HTTP ' + createResp.status + '. ' + t.slice(0, 200));
                err.isLimit = (createResp.status === 402 || createResp.status === 429 || /credit|quota|limit|payment/i.test(t));
                throw err;
            }
            const created = await createResp.json();
            const jobId = created.data.id;

            const waitResp = await fetch('https://sync.api.cloudconvert.com/v2/jobs/' + jobId, {
                method: 'GET', headers: { 'Authorization': 'Bearer ' + CLOUDCONVERT_API_KEY }
            });
            if (!waitResp.ok) {
                const t = await waitResp.text().catch(() => '');
                const err = new Error('Ожидание: HTTP ' + waitResp.status + '. ' + t.slice(0, 200));
                err.isLimit = (waitResp.status === 402 || waitResp.status === 429);
                throw err;
            }
            const finished = await waitResp.json();

            if (finished.data.status === 'error') {
                const tasks = finished.data.tasks || [];
                const limitTask = tasks.find(t => /credit|quota|limit|payment/i.test(JSON.stringify(t.message || '') + JSON.stringify(t.code || '')));
                const err = new Error('Задача завершилась с ошибкой' + (limitTask ? ' (лимит)' : '') + '.');
                err.isLimit = !!limitTask;
                throw err;
            }

            const exportTask = (finished.data.tasks || []).find(t => t.operation === 'export/url' && t.status === 'finished');
            const fileInfo = exportTask && exportTask.result && exportTask.result.files && exportTask.result.files[0];
            if (!fileInfo || !fileInfo.url) {
                throw new Error('Не удалось получить ссылку на готовый PDF.');
            }

            const pdfResp = await fetch(fileInfo.url);
            if (!pdfResp.ok) {
                throw new Error('Не удалось скачать готовый PDF (HTTP ' + pdfResp.status + ').');
            }
            return await pdfResp.blob();

        } catch (e) {
            const isNetwork = !e.isLimit && /Failed to fetch|NetworkError|ERR_CONNECTION/i.test(e.message || '');
            console.warn('CloudConvert попытка ' + attempt + ' не удалась:', e.message || e, '| сеть:', isNetwork, '| лимит:', !!e.isLimit);
            if (isNetwork && attempt < MAX_NETWORK_RETRIES) {
                await new Promise(r => setTimeout(r, RETRY_DELAY_MS));
                continue;
            }
            if (isNetwork) {
                const err = new Error('Сетевая ошибка после ' + MAX_NETWORK_RETRIES + ' попыток: ' + (e.message || e));
                err.isLimit = false;
                throw err;
            }
            throw e;
        }
    }
}

async function cloudconvertDocxToPdf(docxBlob) {
    let lastErr = null;
    try {
        return await cloudconvertOnce(docxBlob);
    } catch (e) {
        lastErr = e;
        console.warn('CloudConvert не сработал:', e.message, '| лимит:', !!e.isLimit);
    }

    const limitHit = lastErr && lastErr.isLimit;
    const isNetworkIssue = lastErr && !lastErr.isLimit && /Сетевая ошибка/.test(lastErr.message || '');
    throw new Error(
        (limitHit
            ? 'Дневной лимит исчерпан на всех доступных сервисах. Попробуйте позже.'
            : isNetworkIssue
                ? 'Не удалось передать файл ни на один сервер конвертации даже после нескольких попыток. ' +
                  'Похоже, соединение обрывается на уровне провайдера. Попробуйте включить VPN и повторить,' +
                  ' либо повторите попытку чуть позже.'
                : 'Конвертация не удалась ни на одном из доступных сервисов.') +
        (lastErr ? ' Последняя ошибка: ' + lastErr.message : '')
    );
}

async function generateAtekPdf() {
    if (!atekDocxTemplate) {
        alert('Шаблон atek.docx не загружен. Проверьте наличие файла в репозитории.');
        return;
    }
    const { data, engines } = buildAtekData();
    if (engines.length === 0) {
        alert('Укажите хотя бы одну модель двигателя.');
        return;
    }

    showLoading('Заполнение шаблона...');
    try {
        // 1. Заполняем docx локально (docxtemplater)
        const filledBlob = fillAtekDocx(data);

        // 2. Конвертируем docx -> pdf через CloudConvert
        showLoading('Конвертация в PDF...');
        const pdfBlob = await cloudconvertDocxToPdf(filledBlob);

        // 3. Скачиваем готовый PDF (один клик, работает на телефоне)
        saveAs(pdfBlob, createFileName());
    } catch (error) {
        console.error('ATEK PDF error:', error);
        alert('Ошибка при создании PDF (АТЭК): ' + (error.message || error));
    } finally {
        hideLoading();
    }
}

// --- Document Update Functions (картиночные шаблоны) ---
function updateBaikalDocument() {
    const setText = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = val; };
    setText('b_doc_num', document.getElementById('input_doc_num').value);
    setText('b_fio', document.getElementById('input_recipient_name').value);

    const passportVal = document.getElementById('input_recipient_id').value || '';
    const passportEl = document.getElementById('b_passport');
    if (passportEl) {
        passportEl.innerText = passportVal;
        if (passportVal.length > 58) {
             passportEl.style.fontSize = "11pt";
             passportEl.style.top = "43.2%";
             passportEl.style.lineHeight = "1.1";
        } else {
             passportEl.style.fontSize = "11.5pt";
             passportEl.style.top = "43.89%";
             passportEl.style.lineHeight = "normal";
        }
    }

    const dateValue = document.getElementById('input_date').value;
    if (dateValue) {
        const d = new Date(dateValue);
        const months = ["Января","Февраля","Марта","Апреля","Мая","Июня","Июля","Августа","Сентября","Октября","Ноября","Декабря"];
        const day = String(d.getDate()).padStart(2, '0');
        const month = months[d.getMonth()];
        const year = String(d.getFullYear()).slice(2);
        ['b_issue_day', 'b_exp_day'].forEach(id => setText(id, day));
        ['b_issue_month', 'b_exp_month'].forEach(id => setText(id, month));
        ['b_issue_year', 'b_exp_year'].forEach(id => setText(id, year));
    }
}

function updateBaikalSpbDocument() {
    const docNum = document.getElementById('input_doc_num').value;
    const dateInput = document.getElementById('input_date').value;
    const fioDob = document.getElementById('input_recipient_fio_dob').value;
    const idNumber = document.getElementById('input_id_number').value.replace(/\D/g, '');
    const issuedBy = document.getElementById('input_issued_by').value;
    const idDateInput = document.getElementById('input_id_date').value;
    const engine = document.getElementById('input_engine_model').value;
    const price = document.getElementById('input_amount').value;

    const idType = document.querySelector('input[name="id_type"]:checked').value;

    const formatDate = (dStr) => {
        if (!dStr) return '';
        const d = new Date(dStr);
        return d.toLocaleDateString('ru-RU');
    };

    const setText = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
    const setHtml = (id, val) => { const el = document.getElementById(id); if(el) el.innerHTML = val; };

    setText('b_spb_d_doc_num', docNum);
    setText('b_spb_d_date', formatDate(dateInput));
    setText('b_spb_d_fio_dob', fioDob);

    const docPrefix = idType === 'passport' ? 'Паспорт' : 'Водительское удостоверение';
    setHtml('b_spb_d_id_num', `<span style="font-weight: 500; font-size: 8pt; position: relative; top: -0.1px;">${docPrefix}</span>: ${idNumber}`);

    setText('b_spb_d_issued_by', issuedBy);
    setText('b_spb_d_issue_date', idDateInput);
    setText('b_spb_d_engine', engine);

    setText('b_spb_z_doc_num', docNum);
    setText('b_spb_z_date', formatDate(dateInput));
    setText('b_spb_z_engine', engine);
    setText('b_spb_z_price', price);
    setText('b_spb_z_sum', price);
}

function updateFortunaDocument() {
    const dateValue = document.getElementById('input_date').value;
    const formattedDate = dateValue ? dateValue.split('-').reverse().join('.') : '';
    const priceInput = document.getElementById('input_amount');
    const price = priceInput ? parseFloat(priceInput.value) : NaN;
    const formattedPrice = !isNaN(price) ? price.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '0,00';

    const setText = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = val; };
    setText('f_city', document.getElementById('input_city').value);
    setText('f_fio', document.getElementById('input_recipient_name').value);
    setText('f_doc_num', document.getElementById('input_doc_num').value);
    setText('f_date', formattedDate);
    setText('f_engine', document.getElementById('input_engine_model').value);
    ['f_price1', 'f_price2', 'f_total1', 'f_total2'].forEach(id => setText(id, formattedPrice));
}

function updateNewlineDocument() {
    const fio = document.getElementById('input_recipient_name').value;
    const dvs = document.getElementById('input_engine_model').value;
    document.getElementById('nl_fio').textContent = fio;
    document.getElementById('nl_dvs').textContent = dvs;

function updateSltkDocument() {
    const docNum = document.getElementById('input_doc_num').value;
    const recipientData = document.getElementById('input_recipient_data').value;
    const engine = document.getElementById('input_engine_model').value;
    const dateInput = document.getElementById('input_date').value;

    const date = new Date(dateInput || new Date());
    const day = date.getDate().toString();
    const dd = date.getDate().toString().padStart(2, '0');
    const mm = (date.getMonth() + 1).toString().padStart(2, '0');
    const yyyy = date.getFullYear();
    const monthName = genitiveMonth(date.getMonth());

    document.getElementById('s_recipient').textContent = recipientData;
    document.getElementById('s_engine').textContent = engine;
    document.getElementById('s_act').textContent = `Акт возврата товара № ${docNum} от ${day} ${monthName} ${yyyy} г.`;
    document.getElementById('s_order').textContent = `Заказ покупателя № ${docNum} от ${dd}.${mm}.${yyyy} г.`;
}

// --- Helper Functions ---
function populateRenderContainer(containerId, data) {
    const container = document.getElementById(containerId);
    container.querySelectorAll('.data-field').forEach(el => el.remove());
    data.forEach(item => {
        const field = document.createElement('div');
        field.id = item.id;
        field.className = 'data-field';
        field.style.top = item.top;
        field.style.left = item.left;
        field.style.width = item.width;
        field.style.fontSize = item.fontSize;
        field.style.fontWeight = item.fontWeight;
        field.style.textAlign = item.align;
        container.appendChild(field);
    });
}

async function generateExcel() {
    if (!excelTemplateFile) return;
    showLoading('Подготовка Excel...');
    try {
        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(excelTemplateFile);
        const worksheet = workbook.getWorksheet(1);

        const dateValue = document.getElementById('input_date').value;
        worksheet.getCell('B2').value = dateValue ? dateValue.split('-').reverse().join('.') : '';
        worksheet.getCell('A7').value = document.getElementById('input_engine_model').value;

        const price = parseFloat(document.getElementById('input_amount').value);
        if (!isNaN(price)) {
            worksheet.getCell('E7').value = price;
            worksheet.getCell('F7').value = price;
        }
        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), createFileName().replace('.pdf','.xlsx'));
    } catch (error) {
        alert("Ошибка Excel: " + error.message);
    } finally {
        hideLoading();
    }
}
function showLoading(message) {
    const el = document.getElementById('loading-text');
    if (el) el.textContent = message || 'Загрузка...';
    document.getElementById('loading-overlay').classList.remove('hidden');
}
function hideLoading() {
    document.getElementById('loading-overlay').classList.add('hidden');
}
